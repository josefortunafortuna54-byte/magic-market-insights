<path d="M910 520 Q975 560 1040 525 Q1105 490 1170 520" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.5"/>

<circle class="orbit" cx="400" cy="400" r="130" fill="none" stroke="#00ff88" stroke-width="0.5" opacity="0.1" stroke-dasharray="6 6"/>
<circle class="orbit2" cx="1040" cy="400" r="130" fill="none" stroke="#00ff88" stroke-width="0.5" opacity="0.1" stroke-dasharray="6 6"/>

<line x1="400" y1="600" x2="400" y2="650" stroke="#00ff88" stroke-width="1" opacity="0.3"/>
<line x1="388" y1="638" x2="400" y2="655" stroke="#00ff88" stroke-width="1" opacity="0.2"/>
<line x1="412" y1="638" x2="400" y2="655" stroke="#00ff88" stroke-width="1" opacity="0.2"/>

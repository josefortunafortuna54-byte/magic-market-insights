  <ellipse cx="1040" cy="520" rx="130" ry="65" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.8"/>
  <ellipse cx="1040" cy="520" rx="100" ry="48" fill="#004d22"/>
  <ellipse cx="1040" cy="520" rx="100" ry="48" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="1040" cy="520" rx="48" ry="48" fill="#001a0d"/>
  <ellipse cx="1040" cy="520" rx="48" ry="48" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.9"/>
  <g class="pupil2">
    <circle cx="1040" cy="520" r="16" fill="#00ff88" opacity="0.9"/>
    <circle cx="1040" cy="520" r="8" fill="#00ff88"/>
    <circle cx="1022" cy="505" r="5" fill="#ffffff" opacity="0.8"/>
    <circle cx="1050" cy="512" r="2" fill="#ffffff" opacity="0.4"/>
  </g>
</g>


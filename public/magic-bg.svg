<svg width="100%" height="100%" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
<defs>
  <radialGradient id="bg" cx="50%" cy="50%" r="70%">
    <stop offset="0%" style="stop-color:#0a0a1a"/>
    <stop offset="100%" style="stop-color:#020208"/>
  </radialGradient>
  <style>
    @keyframes twinkle1 { 0%,100%{opacity:0.9} 50%{opacity:0.1} }
    @keyframes twinkle2 { 0%,100%{opacity:0.6} 30%{opacity:1} 60%{opacity:0.2} }
    @keyframes twinkle3 { 0%,100%{opacity:0.4} 40%{opacity:0.9} 70%{opacity:0.1} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    @keyframes shoot1 { 0%{transform:translate(0,0);opacity:0} 5%{opacity:1} 20%{transform:translate(300px,150px);opacity:0} 100%{transform:translate(300px,150px);opacity:0} }
    @keyframes shoot2 { 0%{transform:translate(0,0);opacity:0} 5%{opacity:1} 20%{transform:translate(-280px,140px);opacity:0} 100%{transform:translate(-280px,140px);opacity:0} }
    @keyframes shoot3 { 0%{transform:translate(0,0);opacity:0} 5%{opacity:1} 20%{transform:translate(250px,120px);opacity:0} 100%{transform:translate(250px,120px);opacity:0} }
    @keyframes glowPulse { 0%,100%{opacity:0.3} 50%{opacity:0.6} }
    .star1 { animation: twinkle1 2s ease-in-out infinite; }
    .star2 { animation: twinkle2 3s ease-in-out infinite; }
    .star3 { animation: twinkle3 2.5s ease-in-out infinite; }
    .star4 { animation: twinkle1 1.8s 0.5s ease-in-out infinite; }
    .star5 { animation: twinkle2 2.2s 1s ease-in-out infinite; }
    .star6 { animation: twinkle3 3s 0.8s ease-in-out infinite; }
    .star7 { animation: twinkle1 2.8s 1.5s ease-in-out infinite; }
    .magic-star { animation: float 4s ease-in-out infinite; }
    .magic-star2 { animation: float 5s 1s ease-in-out infinite; }
    .magic-star3 { animation: float 3.5s 2s ease-in-out infinite; }
    .shoot1 { animation: shoot1 8s 2s ease-in infinite; }
    .shoot2 { animation: shoot2 11s 5s ease-in infinite; }
    .shoot3 { animation: shoot3 14s 9s ease-in infinite; }
    .glow { animation: glowPulse 4s ease-in-out infinite; }
  </style>
</defs>

<rect width="1440" height="900" fill="url(#bg)"/>

<!-- Glow suave no centro -->
<ellipse class="glow" cx="720" cy="450" rx="500" ry="250" fill="#7c3aed" opacity="0.04"/>
<ellipse class="glow" cx="360" cy="600" rx="300" ry="150" fill="#00ff88" opacity="0.03"/>
<ellipse class="glow" cx="1080" cy="300" rx="300" ry="150" fill="#00ff88" opacity="0.03"/>

<!-- Estrelas grandes animadas -->
<g class="magic-star">
  <circle class="star1" cx="720" cy="180" r="3" fill="#00ff88" opacity="0.9"/>
  <path d="M717 175 L720 165 L723 175 L733 178 L723 184 L720 194 L717 184 L707 178 Z" fill="#00ff88" opacity="0.7"/>
</g>
<g class="magic-star2">
  <circle class="star2" cx="150" cy="120" r="2" fill="#ffffff" opacity="0.8"/>
  <path d="M147 115 L150 108 L153 115 L160 118 L153 122 L150 129 L147 122 L140 118 Z" fill="#ffffff" opacity="0.4"/>
</g>
<g class="magic-star3">
  <circle class="star3" cx="1200" cy="100" r="2.5" fill="#fbbf24" opacity="0.7"/>
  <path d="M1197 95 L1200 88 L1203 95 L1210 98 L1203 103 L1200 110 L1197 103 L1190 98 Z" fill="#fbbf24" opacity="0.5"/>
</g>
<g class="magic-star">
  <circle class="star4" cx="600" cy="100" r="2" fill="#fbbf24" opacity="0.7"/>
  <path d="M597 95 L600 88 L603 95 L610 98 L603 103 L600 110 L597 103 L590 98 Z" fill="#fbbf24" opacity="0.4"/>
</g>
<g class="magic-star2">
  <circle class="star1" cx="300" cy="700" r="2" fill="#00ff88" opacity="0.5"/>
  <path d="M297 695 L300 688 L303 695 L310 698 L303 703 L300 710 L297 703 L290 698 Z" fill="#00ff88" opacity="0.3"/>
</g>
<g class="magic-star3">
  <circle class="star2" cx="1100" cy="750" r="2" fill="#fbbf24" opacity="0.5"/>
  <path d="M1097 745 L1100 738 L1103 745 L1110 748 L1103 753 L1100 760 L1097 753 L1090 748 Z" fill="#fbbf24" opacity="0.3"/>
</g>

<!-- Estrelas pequenas -->
<circle class="star1" cx="280" cy="80" r="1.5" fill="#00ff88" opacity="0.6"/>
<circle class="star2" cx="1350" cy="200" r="1.5" fill="#00ff88" opacity="0.5"/>
<circle class="star3" cx="80" cy="300" r="2" fill="#7c3aed" opacity="0.7"/>
<circle class="star4" cx="1380" cy="350" r="1.5" fill="#ffffff" opacity="0.6"/>
<circle class="star5" cx="900" cy="80" r="1.5" fill="#fbbf24" opacity="0.6"/>
<circle class="star6" cx="200" cy="700" r="1.5" fill="#7c3aed" opacity="0.4"/>
<circle class="star7" cx="1300" cy="680" r="2" fill="#00ff88" opacity="0.4"/>
<circle class="star1" cx="100" cy="500" r="1" fill="#ffffff" opacity="0.5"/>
<circle class="star2" cx="1400" cy="450" r="1" fill="#ffffff" opacity="0.5"/>
<circle class="star3" cx="500" cy="200" r="1.5" fill="#ffffff" opacity="0.6"/>
<circle class="star4" cx="960" cy="150" r="1.5" fill="#ffffff" opacity="0.5"/>
<circle class="star5" cx="350" cy="300" r="1" fill="#00ff88" opacity="0.4"/>
<circle class="star6" cx="1100" cy="280" r="1" fill="#00ff88" opacity="0.4"/>
<circle class="star7" cx="810" cy="60" r="1.5" fill="#ffffff" opacity="0.6"/>
<circle class="star1" cx="450" cy="150" r="1" fill="#7c3aed" opacity="0.5"/>
<circle class="star2" cx="990" cy="220" r="1" fill="#7c3aed" opacity="0.4"/>
<circle class="star3" cx="660" cy="50" r="2" fill="#ffffff" opacity="0.7"/>
<circle class="star4" cx="1250" cy="400" r="1" fill="#fbbf24" opacity="0.4"/>
<circle class="star5" cx="180" cy="400" r="1" fill="#fbbf24" opacity="0.3"/>
<circle class="star6" cx="720" cy="800" r="1.5" fill="#00ff88" opacity="0.3"/>
<circle class="star7" cx="540" cy="750" r="1" fill="#ffffff" opacity="0.4"/>
<circle class="star1" cx="1150" cy="600" r="1" fill="#7c3aed" opacity="0.4"/>
<circle class="star2" cx="400" cy="500" r="1" fill="#ffffff" opacity="0.3"/>
<circle class="star3" cx="1050" cy="500" r="1" fill="#ffffff" opacity="0.3"/>

<!-- Estrelas cadentes -->
<g class="shoot1">
  <line x1="200" y1="80" x2="240" y2="80" stroke="#ffffff" stroke-width="2" opacity="0.9" stroke-linecap="round"/>
  <line x1="200" y1="80" x2="180" y2="80" stroke="#ffffff" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <circle cx="240" cy="80" r="2.5" fill="#ffffff" opacity="0.9"/>
</g>
<g class="shoot2">
  <line x1="1100" y1="60" x2="1060" y2="60" stroke="#00ff88" stroke-width="2" opacity="0.9" stroke-linecap="round"/>
  <line x1="1100" y1="60" x2="1120" y2="60" stroke="#00ff88" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <circle cx="1060" cy="60" r="2.5" fill="#00ff88" opacity="0.9"/>
</g>
<g class="shoot3">
  <line x1="600" y1="40" x2="640" y2="40" stroke="#fbbf24" stroke-width="2" opacity="0.9" stroke-linecap="round"/>
  <line x1="600" y1="40" x2="580" y2="40" stroke="#fbbf24" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <circle cx="640" cy="40" r="2.5" fill="#fbbf24" opacity="0.9"/>
</g>
</svg>

<line x1="1028" y1="638" x2="1040" y2="655" stroke="#00ff88" stroke-width="1" opacity="0.2"/>
<line x1="1052" y1="638" x2="1040" y2="655" stroke="#00ff88" stroke-width="1" opacity="0.2"/>

<g class="magic-star">
  <circle class="star1" cx="720" cy="180" r="3" fill="#00ff88" opacity="0.9"/>
